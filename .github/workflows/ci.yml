# tradedesk-miner CI workflow.
#
# Plan 01-06 (Wave 5) lands the FOUR MANDATORY GATES from CONTEXT.md D-21
# plus general hygiene (fmt + test):
#
#   Gate 1 — `cargo build --workspace`             (compile health)
#   Gate 2 — `cargo clippy ... -- -D warnings`     (stdout discipline via
#                                                   clippy.toml disallowed-macros;
#                                                   mitigates T-01-03)
#   Gate 3 — tokio-tree grep against miner-core    (FOUND-04 — async-runtime-free
#                                                   scan engine)
#   Gate 4 — schema-sync diff                      (FOUND-03 — the schemars-derived
#                                                   `schemas/findings-v1.schema.json`
#                                                   IS the contract; mitigates
#                                                   T-01-02 schema drift)
#
# Action pinning posture for Phase 1: major-version tags (`@v4`, `@stable`).
# Phase 7 hardening pass will pin SHAs.

name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Skip CI on release/* PRs. The release-PR diff is a one-line bump to
    # `[workspace.package].version` in Cargo.toml + a deterministic Cargo.lock
    # regen — no behavioural change. CI already ran on every commit on main
    # before the release was triggered, and the post-merge push event still
    # triggers CI on main. Skipping here lets the paperclip-relay → Testy →
    # Cody auto-merge chain proceed without waiting ~12 min for a
    # re-validation of code that's identical to what's already on main.
    #
    # Note: `pull_request: branches-ignore` filters the BASE branch (always
    # `main` for the release flow), so it does NOT skip release/* head refs.
    # The job-level `if:` below is the only filter that works for HEAD refs.
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release/')
    steps:
      - uses: actions/checkout@v6  # v6 runs on Node 24; v4 was deprecated (Node 20)

      - name: Install Rust toolchain (1.85 stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy, rustfmt

      # Gate 1 — build
      - name: cargo build --workspace
        run: cargo build --workspace --all-targets

      # Gate 2 — clippy with -D warnings (catches stdout-discipline violations
      # via the workspace clippy.toml disallowed-macros list from Plan 04).
      - name: cargo clippy --workspace -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Additional hygiene — fmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # cargo test (includes D-22 schema validation tests landed in Plan 07)
      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast

      # Gate 3 — tokio-free miner-core (FOUND-04).
      #
      # The PROHIBITED regex is the exact list from RESEARCH §Tokio-Free Gate:
      # tokio, async-std, smol (any sub-crate), plus async-trait, async-io,
      # async-channel, async-executor, async-task. `--edges normal,build`
      # excludes dev-dependencies (tests are allowed to use a runtime to
      # exercise the wrapper bridges).
      - name: tokio-free miner-core
        run: |
          set -euo pipefail
          PROHIBITED='^(tokio|tokio-[^ ]+|async-std|async-std-[^ ]+|smol|smol-[^ ]+|async-trait|async-io|async-channel|async-executor|async-task)$'
          LEAKED=$(cargo tree -p miner-core --edges normal,build --prefix none \
              | awk '{print $1}' | sort -u \
              | grep -E "$PROHIBITED" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::async runtime crate(s) leaked into miner-core:"
            echo "$LEAKED"
            exit 1
          fi
          echo "ok: miner-core has zero async-runtime dependencies"

      # Gate 4 — schema sync (FOUND-03, mitigates T-01-02).
      #
      # Regenerates `schemas/findings-v1.schema.json` from the schemars derives
      # in miner-core and fails the build if the committed artifact has drifted
      # from the Rust types. Robustness against runner-environment flakes is
      # ensured by (a) Plan 01-01 pinning `serde_json` without `preserve_order`,
      # (b) xtask's `to_value → to_string_pretty` normalisation, (c) Plan 01-06
      # Task 1's twice-run byte-diff acceptance gate.
      - name: schema sync
        run: |
          cargo run -p xtask -- gen-schema
          if ! git diff --exit-code schemas/findings-v1.schema.json; then
            echo "::error::schema drifted from Rust types — re-run \`cargo xtask gen-schema\` and commit"
            exit 1
          fi

      # Gate 7 (Phase 07 Plan 07-03 / D7-05) — cargo audit against the RustSec
      # advisory database. Runs on every push and PR; zero days tolerance.
      # Temporary advisory ignores live in `deny.toml`'s `[advisories] ignore`
      # array with an inline `RUSTSEC-YYYY-NNNN — <reason> — review by
      # YYYY-MM-DD` comment per the allowlist-by-exception policy in
      # CONTRIBUTING.md ## Quality gates.
      # rustsec/audit-check@v2.0.0 installs cargo-audit latest without --locked
      # and as of 2026-05 picks up transitive deps (time@0.3.47, smol_str@0.3.6,
      # ...) that require rustc 1.86+, breaking against this repo's pinned 1.85.
      # Use --locked so cargo-audit's own Cargo.lock pins the dep graph instead.
      # Pin the cargo-audit *version* too: 0.22.2 (released 2026-06) raises its
      # own manifest rust-version to 1.88, so `--locked` alone no longer helps —
      # cargo still selects the latest crate version and rejects it against the
      # pinned 1.85 toolchain. 0.22.1 is the newest release that supports 1.85.
      - name: cargo audit
        run: |
          cargo install --locked --version 0.22.1 cargo-audit
          cargo audit

      # Gate 8 (Phase 07 Plan 07-03 / D7-05) — cargo deny check. Runs all four
      # sub-checks against `deny.toml` at the repo root: licenses (D7-05
      # allowlist of 9 permissive licenses), bans (wildcards denied, multi-
      # version warned), advisories (mirrors cargo audit), sources
      # (unknown-registry + unknown-git denied). The action force-refreshes the
      # advisory database before each run (RESEARCH §Pitfall 5).
      #
      # This step runs last, after build/clippy/test/audit have filled target/
      # with several GB of artifacts. cargo-deny-action is a Docker action whose
      # in-container rustup honours rust-toolchain.toml ("1.85" -> 1.85.1) and
      # re-downloads a full toolchain the prebuilt image lacks (image ships
      # 1.85.0). On a runner with slim free disk that fetch tips over the limit
      # ("No space left on device", os error 28). cargo-deny resolves the dep
      # graph from Cargo.lock and needs no compiled artifacts, and nothing runs
      # after it, so reclaim target/ first to give the fetch headroom. Keep the
      # prebuilt action rather than `cargo install cargo-deny` so we don't risk
      # cargo-deny's MSRV exceeding the pinned 1.85 (cf. the cargo-audit --locked
      # note above).
      - name: free disk before cargo deny
        run: rm -rf target
      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
