name: Prepare Release

# Mirrors the radiusred sibling-repo release pattern (tradedesk + tradedesk-dukascopy):
#   workflow_dispatch ONLY (never auto-fires) → analyze → approval gate
#   (release-approval environment) → execute (branch + PR + wait-for-merge
#   + tag + GitHub Release).
#
# The siblings call radiusred/.github reusable-release.yml, which assumes
# Python + Hatch and bumps pyproject.toml — incompatible with a Cargo
# workspace. This file mirrors the same structure, secrets, and
# environment-gating contract but inlines a Cargo-aware version bump.
#
# Branch-and-PR flow: the org-wide `protect-main` ruleset requires PRs +
# ≥1 reviewer + linear history + rebase-only merges. Direct pushes to main
# are blocked even for the release App's token. So the execute job:
#   1. opens a `release/vX.Y.Z` branch with the version bump commit
#   2. opens a PR to main and waits up to `merge_timeout_minutes` for it
#      to be reviewed + merged
#   3. once merged, tags the merged SHA + creates the GitHub Release
# A reviewer must rebase-merge the PR for the workflow to continue past
# the wait step. (Mirrors radiusred/.github reusable-release.yml.)
#
# Required repo settings (Settings → Secrets and variables → Actions):
#   Variable  RELEASE_APP_CLIENT_ID    — radiusred-release GitHub App client id
#   Secret    RELEASE_APP_PRIVATE_KEY  — the App's private key (PEM)
# Required GitHub Environment:
#   release-approval — Settings → Environments → require reviewers
#
# Publishing of binaries to the Release page happens in publish.yml, which
# fires on `release.published` after this workflow creates the Release.

on:
  workflow_dispatch:
    inputs:
      merge_timeout_minutes:
        description: "Minutes to wait for the release PR to be merged before failing"
        required: false
        default: "60"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze commits and compute next version
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.calc.outputs.bump_type }}
      new_tag: ${{ steps.calc.outputs.new_tag }}
      current_version: ${{ steps.calc.outputs.current_version }}
    steps:
      - name: Generate App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Calculate version (conventional commits → semver bump)
        id: calc
        shell: bash
        run: |
          set -euo pipefail

          # Current workspace version is the single source of truth
          # (Cargo.toml [workspace.package].version; all crates inherit).
          current_version=$(awk '
            /^\[workspace\.package\]/ {in_section=1; next}
            /^\[/ && in_section {exit}
            in_section && /^version[[:space:]]*=[[:space:]]*"/ {
              gsub(/^version[[:space:]]*=[[:space:]]*"|"[[:space:]]*$/, "")
              print
              exit
            }
          ' Cargo.toml)
          if [ -z "$current_version" ]; then
            echo "::error::Could not read [workspace.package].version from Cargo.toml"
            exit 1
          fi

          # Last tag (if any); fall back to v0.0.0 sentinel.
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          # Conventional Commits → bump type.
          # major: any `<type>(scope)?!:` header OR `BREAKING CHANGE:` footer
          # minor: any `feat(scope)?:`
          # patch: anything else (fix, chore, docs, refactor, test, …)
          headers=$(git log "${last_tag}..HEAD" --pretty=format:%s 2>/dev/null || git log --pretty=format:%s)
          bodies=$(git log "${last_tag}..HEAD" --pretty=format:%B 2>/dev/null || git log --pretty=format:%B)

          bump=patch
          if echo "$headers" | grep -Eq '^[a-z]+(\([^)]+\))?!:'; then
            bump=major
          elif echo "$bodies" | grep -qE 'BREAKING[- ]CHANGE:'; then
            bump=major
          elif echo "$headers" | grep -Eqi '^feat(\([^)]+\))?:'; then
            bump=minor
          fi

          IFS=. read -r major minor patch <<< "$current_version"
          case "$bump" in
            major) new_version="$((major + 1)).0.0" ;;
            minor) new_version="${major}.$((minor + 1)).0" ;;
            patch) new_version="${major}.${minor}.$((patch + 1))" ;;
          esac
          new_tag="v${new_version}"

          {
            echo "### Release Plan for ${GITHUB_REPOSITORY}"
            echo ""
            echo "- Current version: \`${current_version}\`"
            echo "- Detected bump: **${bump}** (from $(echo "$headers" | wc -l | tr -d ' ') commit(s) since \`${last_tag}\`)"
            echo "- New version: \`${new_version}\`"
            echo "- New tag: \`${new_tag}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "bump_type=${bump}"
            echo "new_tag=${new_tag}"
            echo "current_version=${current_version}"
          } >> "$GITHUB_OUTPUT"

  gate:
    name: Approval Checkpoint
    needs: analyze
    runs-on: ubuntu-latest
    environment: release-approval
    steps:
      - run: |
          echo "Release approved by environment reviewer."
          echo "  bump: ${{ needs.analyze.outputs.bump_type }}"
          echo "  ${{ needs.analyze.outputs.current_version }} → ${{ needs.analyze.outputs.new_tag }}"

  execute:
    name: Bump workspace version and create Release
    needs: [analyze, gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect existing bump on main (resume support)
        # If main HEAD is already the release-bump commit for NEW_TAG,
        # skip the branch+PR dance and tag/release directly. This makes
        # the workflow safe to re-run after a PR merge that the wait
        # step missed (e.g. workflow timeout).
        id: detect
        env:
          NEW_TAG: ${{ needs.analyze.outputs.new_tag }}
        run: |
          set -euo pipefail
          LAST_MSG=$(git log -1 --pretty=%s)
          if [ "$LAST_MSG" = "chore: release ${NEW_TAG}" ]; then
            echo "already_bumped=true" >> "$GITHUB_OUTPUT"
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "::notice::Release bump for ${NEW_TAG} already present on main; will tag and release directly."
          else
            echo "already_bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump workspace version on release branch
        if: steps.detect.outputs.already_bumped != 'true'
        id: bump
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_TAG: ${{ needs.analyze.outputs.new_tag }}
        run: |
          set -euo pipefail
          BRANCH="release/${NEW_TAG}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::Release branch $BRANCH already exists on origin. Delete it and retry." >&2
            exit 1
          fi
          git checkout -b "$BRANCH"

          # Patch [workspace.package].version in the root Cargo.toml only.
          # Every crate inherits via `version.workspace = true`, so a single
          # write keeps the whole workspace in lockstep.
          new_version="${NEW_TAG#v}"
          python3 - "$new_version" <<'PY'
          import re
          import sys

          new = sys.argv[1]
          path = "Cargo.toml"
          src = open(path, "r", encoding="utf-8").read()

          pattern = re.compile(
              r'(\[workspace\.package\][^\[]*?\nversion\s*=\s*")[^"]*(")',
              re.DOTALL,
          )
          out, n = pattern.subn(rf'\g<1>{new}\g<2>', src, count=1)
          if n != 1:
              sys.stderr.write("ERROR: failed to locate [workspace.package].version\n")
              sys.exit(1)

          open(path, "w", encoding="utf-8").write(out)
          print(f"Bumped [workspace.package].version → {new}")
          PY

          # Refresh Cargo.lock so the bumped version is reflected in
          # transitive resolution. `cargo metadata --no-deps` re-resolves
          # without network so this works in a hermetic CI environment.
          cargo metadata --format-version=1 --no-deps >/dev/null

          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "::error::Cargo.toml already at ${new_version} but main HEAD did not match the expected release commit. Manual intervention required." >&2
            exit 1
          fi
          git commit -m "chore: release ${NEW_TAG}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open release PR
        if: steps.detect.outputs.already_bumped != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_TAG: ${{ needs.analyze.outputs.new_tag }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release ${NEW_TAG}" \
            --body "Automated release bump for ${NEW_TAG}. Reviewer: please rebase-merge once CI is green; the calling workflow will then tag and create the GitHub Release.")
          PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq .number)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "::notice::Opened release PR ${PR_URL}"

      - name: Wait for release PR to merge
        if: steps.detect.outputs.already_bumped != 'true'
        id: wait
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          TIMEOUT_MINUTES: ${{ inputs.merge_timeout_minutes }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=$(( TIMEOUT_MINUTES * 2 ))  # poll every 30s
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            STATE=$(gh pr view "$PR_NUMBER" --json state --jq .state)
            echo "attempt $i/$MAX_ATTEMPTS: state=$STATE"
            if [ "$STATE" = "MERGED" ]; then
              MERGE_SHA=$(gh pr view "$PR_NUMBER" --json mergeCommit --jq .mergeCommit.oid)
              echo "release_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$STATE" = "CLOSED" ]; then
              echo "::error::PR #$PR_NUMBER closed without merging" >&2
              exit 1
            fi
            sleep 30
          done
          echo "::error::PR #$PR_NUMBER did not merge within ${TIMEOUT_MINUTES} minutes. PR remains open for manual merge; re-run this workflow to tag and release once merged." >&2
          exit 1

      - name: Resolve release SHA
        id: release_sha
        env:
          ALREADY_BUMPED: ${{ steps.detect.outputs.already_bumped }}
          EXISTING_SHA:   ${{ steps.detect.outputs.release_sha }}
          MERGED_SHA:     ${{ steps.wait.outputs.release_sha }}
        run: |
          if [ "$ALREADY_BUMPED" = "true" ]; then
            echo "sha=$EXISTING_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$MERGED_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync main after merge
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Generate release notes
        id: notes
        if: hashFiles('cliff.toml') != ''
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ needs.analyze.outputs.new_tag }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_TAG:      ${{ needs.analyze.outputs.new_tag }}
          TARGET_SHA:   ${{ steps.release_sha.outputs.sha }}
        run: |
          set -euo pipefail
          if gh release view "$NEW_TAG" >/dev/null 2>&1; then
            echo "::notice::Release ${NEW_TAG} already exists; skipping create."
            exit 0
          fi
          if [ -s RELEASE_NOTES.md ]; then
            gh release create "$NEW_TAG" --target "$TARGET_SHA" --notes-file RELEASE_NOTES.md
          else
            gh release create "$NEW_TAG" --target "$TARGET_SHA" --generate-notes
          fi
