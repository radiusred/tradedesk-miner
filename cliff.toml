[changelog]
header = ""
body = """
{% if version %}\
## What's Changed in {{ version }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first | trim }}\
{% if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }}){% endif %}\
{% if commit.remote.username %} by [@{{ commit.remote.username }}]({{ self::host() }}/{{ commit.remote.username }}){% endif %}\
{% endfor %}
{% endfor %}

{% if previous %}\
{% if previous.commit_id %}\
**Full Changelog**: {{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}
{% endif %}\
{% endif %}\
{% macro remote_url() %}https://{{ remote.github.host | default(value="github.com") }}/{{ remote.github.owner }}/{{ remote.github.repo }}{% endmacro %}
{% macro host() %}https://{{ remote.github.host | default(value="github.com") }}{% endmacro %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore: release", skip = true },
  { message = "\\[skip ci\\]", skip = true },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
  { body = ".*security", group = "Security" },
  { message = ".*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"

[remote.github]
owner = "radiusred"
repo = "tradedesk-miner"
