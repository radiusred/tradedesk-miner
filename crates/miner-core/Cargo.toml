# miner-core: the library crate. THE ONE PLACE every later Phase compiles against.
#
# CRITICAL — Phase 1 invariants enforced here:
#   * No tokio, no async-std, no smol, no async-trait, no futures-runtime deps. miner-core
#     is sync + rayon only (FOUND-04, D-20). Adding any of these breaks the CI gate
#     `cargo tree -p miner-core` and the agent contract that the engine is purely synchronous.
#   * No workspace-internal deps. miner-core is the foundation; readers, wrappers, and
#     xtask all point at it (one-way arrow, ARCHITECTURE.md §2).
#   * schemars is a real (non-optional) dep because derive impls live on production types
#     and xtask calls `schemars::schema_for!(Finding)` against the same compiled artifact
#     CI validates (Plan 06).
#
# Plan 03 fills in `findings`, `config`, `error` modules; Plan 04 lands the FindingSink trait;
# Plan 06 wires the xtask schema regen.

[package]
name = "miner-core"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]

[dependencies]
serde.workspace      = true
serde_json.workspace = true
schemars.workspace   = true
chrono.workspace     = true
thiserror.workspace  = true
tracing.workspace    = true
ulid.workspace       = true
blake3.workspace     = true
base64.workspace     = true
# Spike-only (Plan 01-02). Plan 05 will move figment into the production `config`
# module; Plan 03 will delete the spike_figment module. Kept here (not dev-deps)
# because the spike module lives in `src/`, not `tests/`.
figment.workspace    = true

[dev-dependencies]
jsonschema.workspace = true
# Spike-only (Plan 01-02). clap is intentionally NEVER a non-dev dep of miner-core
# per D-16 — wrappers carry clap, miner-core does not. The spike uses it only to
# construct a CliOverrides shape mirroring the Plan 05 production pattern.
clap.workspace       = true
# Spike-only (Plan 01-02). figment::Jail (the canonical figment testing helper)
# lives behind the `test` feature and provides serialised, scope-cleaned env-var
# mutation — the alternative would be `unsafe { std::env::set_var(..) }` which
# the workspace `unsafe_code = "forbid"` lint correctly rejects. Plan 05 will
# either retain this dev-dep or migrate to figment's `Provider` test fixtures.
figment              = { version = "0.10", features = ["toml", "env", "test"] }

[lints]
workspace = true
